<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quer namorar comigo?</title>

<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        overflow: hidden;
        text-align: center;
        padding: 20px;
    }

    h1 {
        font-size: 1.8rem;
        color: white;
        margin-bottom: 40px;
    }

    .container {
        position: relative;
        width: 100%;
        max-width: 350px;
        height: 300px;
    }

    button {
        position: absolute;
        padding: 14px 24px;
        font-size: 1rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: bold;
    }

    #yesBtn {
        background-color: #22c55e;
        color: white;
        left: 20%;
        bottom: 20px;
    }

    #noBtn {
        background-color: #ef4444;
        color: white;
        right: 20%;
        bottom: 20px;
    }

    .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        top: -10px;
        animation: fall linear forwards;
    }

    @keyframes fall {
        to {
            transform: translateY(100vh) rotate(720deg);
        }
    }
</style>
</head>
<body>

<h1>💖 Quer namorar comigo? 💖</h1>

<div class="container">
    <button id="yesBtn">Sim 💍</button>
    <button id="noBtn">Não 😢</button>
</div>

<!-- Música -->
<audio id="romanticMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c8c5fdf67.mp3?filename=romantic-background-112191.mp3" type="audio/mpeg">
</audio>

<script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const music = document.getElementById("romanticMusic");

    let yesScale = 1;
    let noScale = 1;
    let musicStarted = false;

    function startMusic() {
        if (!musicStarted) {
            music.play();
            music.volume = 0.6;
            musicStarted = true;
        }
    }

    // Inicia música ao primeiro toque na tela
    document.addEventListener("click", startMusic);

    noBtn.addEventListener("click", () => {
        startMusic();

        yesScale += 0.15;
        yesBtn.style.transform = `scale(${yesScale})`;

        noScale -= 0.1;
        if (noScale > 0.3) {
            noBtn.style.transform = `scale(${noScale})`;
        }

        const maxX = window.innerWidth - noBtn.offsetWidth;
        const maxY = window.innerHeight - noBtn.offsetHeight;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * (maxY - 100);

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    });

    yesBtn.addEventListener("click", () => {
        startMusic();
        lançarConfete();
    });

    function lançarConfete() {
        for (let i = 0; i < 120; i++) {
            const confetti = document.createElement("div");
            confetti.classList.add("confetti");

            confetti.style.left = Math.random() * window.innerWidth + "px";
            confetti.style.backgroundColor =
                `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.animationDuration =
                (Math.random() * 2 + 2) + "s";

            document.body.appendChild(confetti);

            setTimeout(() => {
                confetti.remove();
            }, 4000);
        }

        setTimeout(() => {
            alert("💖 Agora é oficial 😍💍");
        }, 500);
    }
</script>

</body>
</html>
