<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relationship Funny</title>

<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #eacbd1, #f1e8ec);
        overflow: hidden;
        text-align: center;
        padding: 20px;
    }

    h1 {
        font-size: 1.8rem;
        color: rgb(17, 15, 15);
        margin-bottom: 40px;
    }

    .container {
        position: relative;
        width: 100%;
        max-width: 350px;
        height: 300px;
    }

    button {
        position: absolute;
        padding: 14px 24px;
        font-size: 1rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: bold;
    }

    #yesBtn {
        background-color: #d92323;
        color: white;
        left: 20%;
        bottom: 20px;
    }

    #noBtn {
        background-color: #312b31;
        color: white;
        right: 20%;
        bottom: 20px;
    }

    .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        top: -10px;
        animation: fall linear forwards;
    }

    @keyframes fall {
        to {
            transform: translateY(100vh) rotate(720deg);
        }
    }
</style>
</head>
<body>

<h1>Quando você vai assumir que eu sou o amor da sua vida?</h1>

<div class="container">
    <button id="yesBtn">Assumo todos os dias, meu amor</button>
    <button id="noBtn">Nunca</button>
</div>

<!-- 🎵 Música romântica local -->
<audio id="romanticMusic" loop>
    <source src="maksym_dudchyk-lost-in-love-instrumental-background-music-for-video-full-version-490031.mp3" type="audio/mpeg">
</audio>

<!-- 💻 Som Windows XP error -->
<audio id="errorXP">
    <source src="windows-error.mp3" type="audio/mpeg">
</audio>

<!-- 🎮 Som videogame acesso negado -->
<audio id="accessDenied">
    <source src="acesso-negado.mp3" type="audio/mpeg">
</audio>

<script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");

    const music = document.getElementById("romanticMusic");
    const errorXP = document.getElementById("errorXP");
    const accessDenied = document.getElementById("accessDenied");

    let yesScale = 1;
    let noScale = 1;

    function playMusic() {
        music.volume = 0.6;
        music.play().catch(e => console.log(e));
    }

    noBtn.addEventListener("click", () => {

        // 🔊 Toca sons engraçados alternando
        errorXP.currentTime = 0;
        accessDenied.currentTime = 0;

        if (Math.random() > 0.5) {
            errorXP.play();
        } else {
            accessDenied.play();
        }

        // Cresce botão SIM
        yesScale += 0.15;
        yesBtn.style.transform = `scale(${yesScale})`;

        // Diminui botão NÃO
        noScale -= 0.1;
        if (noScale > 0.3) {
            noBtn.style.transform = `scale(${noScale})`;
        }

        // Move botão NÃO
        const maxX = window.innerWidth - noBtn.offsetWidth;
        const maxY = window.innerHeight - noBtn.offsetHeight;

        noBtn.style.left = Math.random() * maxX + "px";
        noBtn.style.top = Math.random() * maxY + "px";
    });

    yesBtn.addEventListener("click", () => {
        playMusic();
        lançarConfete();
    });

    function lançarConfete() {
        for (let i = 0; i < 120; i++) {
            const confetti = document.createElement("div");
            confetti.classList.add("confetti");

            confetti.style.left = Math.random() * window.innerWidth + "px";
            confetti.style.backgroundColor =
                `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.animationDuration =
                (Math.random() * 2 + 2) + "s";

            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 4000);
        }

        setTimeout(() => {
            alert("💖 Escolheu a melhor mulher pra sua vida 💖");
        }, 500);
    }
</script>

</body>
</html>
