<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Perfeito 💘</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow: hidden;
    text-align: center;
    padding: 20px;
    transition: 0.3s;
}

h1 { 
    font-size: 1.7rem; 
    margin-bottom: 30px;
    color: #7a1c2e;
}

.container {
    position: relative;
    width: 100%;
    max-width: 350px;
    height: 250px;
}

.buttons-area {
    position: relative;
    width: 100%;
    height: 200px;
}

button {
    padding: 14px 22px;
    border-radius: 30px;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

#yesBtn {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
}

#yesBtn:hover {
    transform: translateX(-50%) scale(1.05);
}

#noBtn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #444;
    color: white;
}

.resultScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #fff1f5, #ffe3ec);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    animation: fadeIn 1s ease forwards;
    text-align: center;
    padding: 20px;
}

.resultScreen img {
    width: 250px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translate(2px, 2px); }
    25% { transform: translate(-2px, -2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-2px, 2px); }
    100% { transform: translate(0, 0); }
}

.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(100vh) rotate(720deg); }
}
</style>
</head>
<body>

<h1 id="question">Quando você vai assumir que eu sou o amor da sua vida?</h1>

<div class="container">
    <div class="buttons-area">
        <button id="yesBtn">Assumo todos os dias ❤️</button>
        <button id="noBtn">Nunca</button>
    </div>
</div>

<div class="resultScreen" id="result">
    <img src="foto.png">
    <h2>💖 Oficialmente o amor da sua vida 💖</h2>
    <p>Eu sabia que você não resistiria 😏</p>
</div>

<audio id="romanticMusic" loop>
    <source src="sua-musica.mp3" type="audio/mpeg">
</audio>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");
const music = document.getElementById("romanticMusic");

let yesScale = 1;
let noScale = 1;

const noTexts = [
    "Tem certeza?",
    "Olha de novo 👀",
    "Resposta suspeita...",
    "Você sabe que me ama 😌",
    "Última chance 😏"
];

function errorBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.value = 200;
    gain.gain.value = 0.3;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
}

let count = 0;

noBtn.addEventListener("click", () => {
    count++;

    errorBeep();

    document.body.classList.add("shake");
    setTimeout(() => document.body.classList.remove("shake"), 300);

    noBtn.textContent = noTexts[count % noTexts.length];

    yesScale += 0.15;
    yesBtn.style.transform = `translateX(-50%) scale(${yesScale})`;

    noScale -= 0.08;
    if (noScale > 0.4)
        noBtn.style.transform = `scale(${noScale})`;

    const area = document.querySelector(".buttons-area");
    const maxX = area.clientWidth - noBtn.offsetWidth;
    const maxY = area.clientHeight - noBtn.offsetHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
});

yesBtn.addEventListener("click", () => {
    music.volume = 0.6;
    music.play().catch(()=>{});
    lançarConfete();
    setTimeout(() => result.style.display = "flex", 1000);
});

function lançarConfete() {
    for (let i = 0; i < 150; i++) {
        const c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * window.innerWidth + "px";
        c.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration = (Math.random()*2+2)+"s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}
</script>

</body>
</html>
